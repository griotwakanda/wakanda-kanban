<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wakanda Assist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wallpaper"></div>

    <main class="phone">
      <header class="top">
        <button class="icon-btn">◌</button>
        <button id="refresh-btn" class="icon-btn">◔</button>
      </header>

      <section class="hero">
        <h1>Welcome!<br/>How Can I help<br/>You Today?</h1>
        <p id="summary">Loading command state…</p>
      </section>

      <section class="quick-grid" id="metrics"></section>

      <section class="section">
        <div class="section-head">
          <h2>Recent Ops</h2>
          <span id="last-updated">now</span>
        </div>
        <div id="ops-list" class="list"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <h2>Repositories</h2>
          <span id="repos-count">0</span>
        </div>
        <div id="repos" class="list"></div>
      </section>

      <footer class="composer">
        <span>Message</span>
        <span>⌁</span>
      </footer>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
