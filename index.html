<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wakanda AI Command</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-glow glow-a"></div>
    <div class="bg-glow glow-b"></div>

    <header class="top">
      <div>
        <p class="brand">OpenClaw · Wakanda</p>
        <h1>AI Mission Command</h1>
      </div>
      <button id="refresh-btn" class="btn">Refresh</button>
    </header>

    <main class="app">
      <section class="hero">
        <p class="hero-kicker">Live execution state</p>
        <h2 id="headline">Loading mission pulse…</h2>
        <p id="summary">Reading board data.</p>

        <div class="hero-row">
          <div class="progress-wrap">
            <div id="progress" class="progress"></div>
          </div>
          <p id="score" class="score">0 / 100</p>
        </div>

        <p id="last-updated" class="updated">Updated just now</p>
      </section>

      <section class="strip" id="metrics"></section>

      <section class="panel">
        <div class="panel-head">
          <h3>Ops</h3>
          <span id="agents-count"></span>
        </div>
        <div id="agents-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Cron Rhythm</h3>
          <span id="cron-count"></span>
        </div>
        <div id="cron-list" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Current Pipeline</h3>
          <span id="cards-count"></span>
        </div>
        <div id="pipeline" class="list"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>Repositories</h3>
          <span id="repos-count"></span>
        </div>
        <div id="repos" class="repos"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
