<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wakanda Kanban</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Wakanda Kanban</h1>
      <p>High-level project board for Daniel</p>
    </header>

    <main>
      <div id="board" class="board" aria-live="polite"></div>
      <footer class="footer">
        <small id="last-updated" class="last-updated" aria-live="polite"></small>
      </footer>
    </main>

    <template id="card-template">
      <article class="card">
        <h3 class="card-title"></h3>
        <p class="card-status"></p>
        <ul class="card-tasks"></ul>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
